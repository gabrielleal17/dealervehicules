{% extends "base.html" %}
{% block content %}
    <h2>Inventario</h2>
    <div style="display: flex; justify-content: flex-end;">
    <a href="{{ url_for('add_vehicule') }}" class="btn btn-primary">Agregar Vehículo</a>
    </div>
    <br>
    <table class="table">
        {% for v in vehiculos %}  <tr>
            <tr>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Precio</th>
                <th>Action</th>
            </tr>
            <tr>
                <td>{{ v.brand }}</td>
                <td>{{ v.model }}</td>
                <td>{{ v.price }}</td>
                <td><a href="{{ url_for('edit_vehicule', id=v.id) }}" class="btn btn-warning btn-sm">Editar</a></td>
            </tr>
        </tr>
        {% else %}
        <tr>
            <td colspan="3" class="text-center">No hay vehículos registrados en Supabase.</td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
