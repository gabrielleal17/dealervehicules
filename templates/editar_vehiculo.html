{% extends "base.html" %}
{% block content %}
<h2>Editar Vehículo</h2>
<form method="POST">
    <div class="form-group">
        <label for="brand">Marca:</label>
        <input type="text" class="form-control" id="brand" name="brand" value="{{ vehicule.brand }}" required>
    </div>
    <div class="form-group">
        <label for="model">Modelo:</label>
        <input type="text" class="form-control" id="model" name="model" value="{{ vehicule.model }}" required>
    </div>
    <div class="form-group">
        <label for="year">Año:</label>
        <input type="number" class="form-control" id="year" name="year" value="{{ vehicule.year }}" required>
    </div>
    <div class="form-group">
        <label for="kilometers">Kilómetros:</label>
        <input type="number" class="form-control" id="kilometers" name="kilometers" value="{{ vehicule.kilometers }}" required>
    </div>
    <div class="form-group">
        <label for="color">Color:</label>
        <input type="text" class="form-control" id="color" name="color" value="{{ vehicule.color }}" required>
    </div>
    <div class="form-group">
        <label for="price">Precio:</label>
        <input type="number" step=0.01 class="form-control" id=price name=price value="{{ vehicule.price }}" required>
    </div>

    <br>
    <button type = "submit" class = "btn btn-primary">Actualizar Vehículo</button> 
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Volver</a>
</form>

{% endblock %}
