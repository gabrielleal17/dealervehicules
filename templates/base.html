<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Inventario Transporte</title>
    <style>
        body {
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* BARRA LATERAL ESTÁTICA */
        #sidebar {
            width: 250px;
            min-width: 250px;
            background-color: #212529; /* Dark color */
            color: white;
            position: fixed;
            height: 100%;
            z-index: 100;
        }

        /* CONTENIDO PRINCIPAL */
        #main-content {
            flex-grow: 1;
            margin-left: 250px; /* Espacio exacto del sidebar */
            width: calc(100% - 250px);
        }

        .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-link:hover {
            background-color: #343a40;
            color: white;
        }

        .nav-link.active {
            background-color: #0d6efd;
            color: white;
        }

        /* Estilo para cuando NO hay sesión (Login) */
        .no-sidebar #sidebar { display: none; }
        .no-sidebar #main-content { margin-left: 0; width: 100%; }
    </style>
</head>
<body class="{% if not current_user.is_authenticated %}no-sidebar{% endif %}">

    {% if current_user.is_authenticated %}
    <div id="sidebar">
        <div class="p-4 text-center border-bottom">
            <h4 class="mb-0">🚚 Dealer</h4>
            <small class="text-muted">Panel de Control</small>
        </div>
        <div class="nav flex-column mt-2">
            <a href="{{ url_for('index') }}" class="nav-link">📦 Inventario</a>
            <a href="#" class="nav-link">📊 Reportes</a>
            <a href="{{ url_for('clients') }}" class="nav-link">👥 Clientes</a>
            <a href="{{ url_for('logout') }}" class="nav-link mt-auto text-danger">🚪 Cerrar Sesión</a>
        </div>
    </div>
    {% endif %}

    <div id="main-content">
        <nav class="navbar navbar-light bg-white border-bottom px-4">
            <span class="navbar-brand mb-0 h1">Dealer App</span>
            {% if current_user.is_authenticated %}
                <span class="badge bg-secondary">Usuario: {{ current_user.username }}</span>
            {% endif %}
        </nav>

        <div class="container-fluid p-4">
            {% block content %}{% endblock %}
        </div>
    </div>

</body>
</html>
